<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - SnapLocate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#080b14',
                        accent: '#5c6fff',
                        accent2: '#a78bfa',
                        glass: 'rgba(255,255,255,0.04)',
                        glassBorder: 'rgba(255,255,255,0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Manrope', sans-serif !important; }
        body { background-color: theme('colors.bg'); color: #111111 !important; }
        /* Pulse Animation for Map Marker */
        .pulse-marker {
            position: relative;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pulse-marker::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(92, 111, 255, 0.3);
            border-radius: 50%;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .pulse-dot {
            width: 10px;
            height: 10px;
            background: theme('colors.accent');
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 10px theme('colors.accent');
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        
        .slide-in-left { animation: slideInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInLeft { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .fade-in-map { opacity: 0; animation: fadeIn 1s ease forwards; animation-delay: 0.3s; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Leaflet resets */
        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body class="min-h-screen overflow-hidden flex flex-col md:flex-row relative">

    <!-- LEFT PANEL (38%) -->
    <div class="w-full md:w-[38%] h-auto md:h-screen p-8 md:p-12 flex flex-col slide-in-left z-10 bg-bg shadow-[20px_0_40px_rgba(0,0,0,0.5)] relative overflow-y-auto">
        <!-- Blur Blob -->
        <div class="absolute top-[-100px] left-[-100px] w-[500px] h-[500px] rounded-full bg-accent opacity-[0.10] blur-[120px] -z-10 pointer-events-none"></div>

        <!-- Logo -->
        <a href="index.html" class="flex items-center gap-2 font-extrabold text-2xl mb-10 w-fit text-[#111111]">
            <span class="text-accent">⬡</span> SnapLocate
        </a>
        
        <!-- Uploaded Photo Preview -->
        <div class="w-full h-[220px] md:h-[260px] rounded-3xl overflow-hidden bg-glass border border-[#111111]/10 mb-8 flex-shrink-0 relative group">
            <img id="result-image" src="" alt="Uploaded Photo" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-300"></div>
        </div>

        <!-- Location Card  -->
        <div class="bg-glass border border-[#111111]/10 rounded-3xl p-8 backdrop-blur-xl flex-grow flex flex-col relative overflow-hidden">
            <div class="absolute -right-20 -top-20 w-40 h-40 bg-accent2 opacity-10 blur-3xl rounded-full pointer-events-none"></div>
            
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-green-500/10 border border-green-500/20 text-green-600 text-xs font-semibold w-fit mb-6">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> 📍 Location Found
            </div>
            
            <h2 id="loc-city" class="font-extrabold text-[40px] md:text-[48px] leading-tight mb-3 bg-gradient-to-r from-accent to-accent2 text-transparent bg-clip-text">
                Loading...
            </h2>
            <p id="loc-address" class="text-[#111111] text-[15px] mb-8 leading-relaxed line-clamp-3">
                Pinpointing accurate address details...
            </p>
            
            <div class="bg-[#111111]/5 border border-[#111111]/10 rounded-xl p-4 mb-10">
                <p class="text-[#111111] text-xs uppercase tracking-wider mb-2 font-bold">Coordinates</p>
                <div class="flex items-center justify-between">
                    <p id="loc-coords" class="font-mono text-[13px] text-[#111111] font-semibold tracking-wide" style="letter-spacing: 0.5px;">0.000000, 0.000000</p>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col gap-4 mt-auto">
                <button id="copy-btn" class="w-full bg-transparent border border-[#111111]/20 hover:bg-[#111111]/5 text-[#111111] py-3.5 rounded-xl font-semibold transition-all duration-300 flex items-center justify-center gap-2">
                    <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg> 
                    <span>Copy Coordinates</span>
                </button>
                <a href="upload.html" class="w-full text-center bg-gradient-to-r from-accent to-accent2 text-[#111111] py-3.5 rounded-xl font-bold text-lg hover:shadow-[0_0_20px_rgba(92,111,255,0.4)] transition-all duration-300 hover:-translate-y-0.5">
                    Search Another
                </a>
            </div>
        </div>
    </div>

    <!-- RIGHT PANEL - MAP (62%) -->
    <div class="w-full md:w-[62%] h-[50vh] md:h-screen relative fade-in-map z-0 bg-[#080b14]">
        <div id="map" class="w-full h-full"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const latStr = localStorage.getItem('lat'); // Updated keys matching new logic
            const lngStr = localStorage.getItem('lng');
            const imgData = localStorage.getItem('uploadedImage');

            // Redirect back if no data
            if (!latStr || !lngStr || localStorage.getItem('gpsFound') !== 'true') {
                window.location.href = 'upload.html';
                return;
            }

            const lat = parseFloat(latStr);
            const lng = parseFloat(lngStr);

            // Populate preview image
            if (imgData) {
                document.getElementById('result-image').src = imgData;
            }

            // Init Map without default controls
            const map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([lat, lng], 16);

            L.tileLayer('https://cartodb-basemaps-a.global.ssl.fastly.net/dark_all/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);

            // Custom pulse marker
            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div class='pulse-marker'><div class='pulse-dot'></div></div>",
                iconSize: [32, 32],
                iconAnchor: [16, 16]
            });

            L.marker([lat, lng], { icon: customIcon }).addTo(map);

            // Populate coordinates
            const cityEl = document.getElementById('loc-city');
            const addrEl = document.getElementById('loc-address');
            const coordsEl = document.getElementById('loc-coords');

            coordsEl.textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;

            // Reverse Geocoding with Nominatim API (Free)
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
                .then(res => res.json())
                .then(data => {
                    const address = data.address || {};
                    const city = address.city || address.town || address.village || address.suburb || address.county || data.name || "Unknown Area";
                    
                    cityEl.textContent = city;
                    addrEl.textContent = data.display_name || "Address not found";
                })
                .catch(() => {
                    cityEl.textContent = "Location Found";
                    addrEl.textContent = "Could not resolve exact street network address.";
                });

            // Copy coordinates functionality
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(`${lat}, ${lng}`).then(() => {
                    const originalHTML = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<span>Copied to Clipboard! ✓</span>';
                    copyBtn.classList.add('border-accent', 'bg-accent/10', 'text-accent');
                    
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHTML;
                        copyBtn.classList.remove('border-accent', 'bg-accent/10', 'text-accent');
                    }, 2000);
                });
            });
        });
    </script>
</body>
</html>
